<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dulla Vizuli - Login</title>
<style>
/* Reset & Base */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    height: 100vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Background - Picha inaonekana wazi */
.bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Picha imewekwa hapa na kufunikwa na rangi nyepesi sana ili maandishi yasomeke */
    background: 
        linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.25)),
        url('https://res.cloudinary.com/dvbftux6w/image/upload/v1782497850/xbbsnfjqbvlq39m7rd4i.jpg');
    background-size: cover;
    background-position: center;
    z-index: -1;
}

/* Glassmorphism Card - Inaruhusu picha ionekane */
.glass-card {
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 28px;
    padding: 45px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    text-align: center;
    position: relative;
    z-index: 10;
}

/* Brand Title */
.brand-title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.5px;
    /* Rangi ya kuvutia kwa jina */
    background: linear-gradient(135deg, #00ffcc, #00ccff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
}

.subtitle {
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    margin-bottom: 25px;
}

/* Hidden Radio Buttons (For No-JS Tabs) */
input[type="radio"] {
    display: none;
}

/* Tab Labels (Buttons) */
.tabs {
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 25px;
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.tabs label {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border-radius: 12px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 600;
    font-size: 15px;
    transition: all 0.3s ease;
}

/* Active Tab Styling */
#loginTab:checked ~ .tabs label[for="loginTab"],
#signupTab:checked ~ .tabs label[for="signupTab"] {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
}

/* Form Visibility Toggling */
.login-form, .signup-form {
    display: none;
    animation: fadeIn 0.4s ease;
}

#loginTab:checked ~ .login-form {
    display: block;
}

#signupTab:checked ~ .signup-form {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Inputs Styling */
.input-group {
    margin-bottom: 18px;
    text-align: left;
}

.input-group label {
    display: block;
    color: rgba(255, 255, 255, 0.8);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
}

.input-group input {
    width: 100%;
    padding: 14px 15px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: 0.3s ease;
}

.input-group input:focus {
    border-color: #00ffcc;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
}

.input-group input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

/* Action Button */
.btn-primary {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #00ffcc;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 255, 204, 0.3);
}

/* Footer Links */
.footer-links {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    font-size: 13px;
}

.footer-links a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: none;
    transition: color 0.3s ease;
}

.footer-links a:hover {
    color: #00ffcc;
}

/* Responsive for Mobile */
@media (max-width: 480px) {
    .glass-card {
        padding: 30px 20px;
        margin: 15px;
    }
    .brand-title {
        font-size: 28px;
    }
}
</style>
</head>
<body>

    <!-- Background Image Container -->
    <div class="bg-container"></div>

    <!-- Main Login/Signup Card -->
    <div class="glass-card">
        <h1 class="brand-title">Dulla Vizuli</h1>
        <p class="subtitle">Welcome back, enter your details.</p>

        <!-- Hidden Radios for Tab Switching -->
        <input type="radio" name="auth-tab" id="loginTab" checked>
        <input type="radio" name="auth-tab" id="signupTab">

        <!-- Tabs -->
        <div class="tabs">
            <label for="loginTab">🔑 Login</label>
            <label for="signupTab">📝 Sign Up</label>
        </div>

        <!-- ================= LOGIN FORM ================= -->
        <div class="login-form">
            <form>
                <div class="input-group">
                    <label>📧 Email Address</label>
                    <input type="email" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <button type="button" class="btn-primary">Sign In</button>
                <div class="footer-links">
                    <a href="#">Forgot password?</a>
                    <a href="#" onclick="document.getElementById('signupTab').click(); return false;">Create account</a>
                </div>
            </form>
        </div>

        <!-- ================= SIGNUP FORM ================= -->
        <div class="signup-form">
            <form>
                <div class="input-group">
                    <label>👤 Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>📧 Email Address</label>
                    <input type="email" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" placeholder="At least 6 characters" required>
                </div>
                <div class="input-group">
                    <label>✅ Confirm Password</label>
                    <input type="password" placeholder="Confirm your password" required>
                </div>
                <button type="button" class="btn-primary">Create Account</button>
                <div class="footer-links" style="justify-content:center;">
                    <a href="#" onclick="document.getElementById('loginTab').click(); return false;">Already have an account? Login</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
