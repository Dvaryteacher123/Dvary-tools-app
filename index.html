<script>
// ============================================
// FIREBASE CONFIG - SDK YAKO
// ============================================
const firebaseConfig = {
apiKey: "AIzaSyDpFyANpjv2dMUvXoMSSmqoT3s1UwJLUkg",
authDomain: "dvary-9a7d0.firebaseapp.com",
projectId: "dvary-9a7d0",
storageBucket: "dvary-9a7d0.firebasestorage.app",
messagingSenderId: "107370806066",
appId: "1:107370806066:android:e954fb03d99e52ac09f52b"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ============================================
// DOM ELEMENTS
// ============================================
const loginScreen = document.getElementById('loginScreen');
const appContent = document.getElementById('appContent');
const loginForm = document.getElementById('loginFormElement');
const signupForm = document.getElementById('signupFormElement');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const signupName = document.getElementById('signupName');
const signupEmail = document.getElementById('signupEmail');
const signupPassword = document.getElementById('signupPassword');
const signupConfirm = document.getElementById('signupConfirmPassword');
const signInBtn = document.getElementById('signInBtn');
const loading = document.getElementById('loading');
const message = document.getElementById('message');
const tabBtns = document.querySelectorAll('.tab-btn');

// ============================================
// HELPERS
// ============================================
function showLoading() { loading.classList.add('active'); }
function hideLoading() { loading.classList.remove('active'); }

function showMessage(text, type = 'info') {
message.textContent = text;
message.className = 'message active ' + type;
setTimeout(() => {
message.classList.remove('active');
}, 5000);
}

function clearForms() {
loginEmail.value = '';
loginPassword.value = '';
signupName.value = '';
signupEmail.value = '';
signupPassword.value = '';
signupConfirm.value = '';
}

// ============================================
// TABS
// ============================================
tabBtns.forEach(btn => {
btn.addEventListener('click', function() {
tabBtns.forEach(b => b.classList.remove('active'));
this.classList.add('active');
const tab = this.dataset.tab;
document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
document.getElementById(tab + 'Form').classList.add('active');
message.classList.remove('active');
});
});

// ============================================
// SIGN UP
// ============================================
signupForm.addEventListener('submit', async (e) => {
e.preventDefault();
const name = signupName.value.trim();
const email = signupEmail.value.trim();
const password = signupPassword.value;
const confirm = signupConfirm.value;

if (!name || !email || !password || !confirm) {
showMessage('Tafadhali jaza sehemu zote', 'error');
return;
}
if (password !== confirm) {
showMessage('Nenosiri hazifanani!', 'error');
return;
}
if (password.length < 6) {
showMessage('Nenosiri lazima liwe na angalau herufi 6', 'error');
return;
}

showLoading();
try {
const result = await auth.createUserWithEmailAndPassword(email, password);
await result.user.updateProfile({ displayName: name });
hideLoading();
showMessage('✅ Akaunti imeundwa! Karibu ' + name + '!', 'success');
clearForms();
} catch (error) {
hideLoading();
let msg = 'Kosa: ';
switch (error.code) {
case 'auth/email-already-in-use': msg += 'Barua pepe hii tayari inatumika.'; break;
case 'auth/invalid-email': msg += 'Barua pepe si sahihi.'; break;
case 'auth/weak-password': msg += 'Nenosiri ni dhaifu.'; break;
default: msg += error.message;
}
showMessage(msg, 'error');
}
});

// ============================================
// LOGIN
// ============================================
loginForm.addEventListener('submit', async (e) => {
e.preventDefault();
const email = loginEmail.value.trim();
const password = loginPassword.value;

if (!email || !password) {
showMessage('Tafadhali jaza barua pepe na nenosiri', 'error');
return;
}

showLoading();
try {
await auth.signInWithEmailAndPassword(email, password);
hideLoading();
showMessage('✅ Umefanikiwa kuingia!', 'success');
clearForms();
} catch (error) {
hideLoading();
let msg = 'Kosa: ';
switch (error.code) {
case 'auth/user-not-found': msg += 'Akaunti haipatikani. Jiandikisha kwanza.'; break;
case 'auth/wrong-password': msg += 'Nenosiri si sahihi.'; break;
case 'auth/invalid-email': msg += 'Barua pepe si sahihi.'; break;
case 'auth/too-many-requests': msg += 'Majaribio mengi sana. Jaribu tena baadaye.'; break;
default: msg += error.message;
}
showMessage(msg, 'error');
}
});

// ============================================
// GOOGLE SIGN IN
// ============================================
signInBtn.addEventListener('click', async () => {
showLoading();
try {
await auth.signInWithPopup(googleProvider);
hideLoading();
showMessage('✅ Umefanikiwa kuingia na Google!', 'success');
} catch (error) {
hideLoading();
if (error.code === 'auth/popup-blocked') {
showMessage('⚠️ Ruhusu popups kwenye browser yako.', 'error');
} else if (error.code === 'auth/popup-closed-by-user') {
showMessage('Umeghairi kuingia.', 'info');
} else if (error.code !== 'auth/cancelled-popup-request') {
showMessage('Kosa: ' + error.message, 'error');
}
}
});

// MATRIX EFFECT
// ============================================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const letters="DVARY01";
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ffcc";
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
const text=letters.charAt(Math.floor(Math.random()*letters.length));
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}
drops[i]++;
}
}
setInterval(draw,35);
